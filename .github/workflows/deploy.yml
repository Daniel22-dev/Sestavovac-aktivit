name: ACTIVA QA and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-fund
      - run: npx playwright install --with-deps chromium
      - run: node scripts/doc-import-test.mjs
      - run: npm run qa:release
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: activa-qa-results
          path: qa-results
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: certify
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="cs" data-ghrab-access="checking">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://generativelanguage.googleapis.com; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <title>ACTIVA · Sestavovač aktivit</title>
  <meta name="theme-color" content="#3157ff">
  <meta name="application-name" content="ACTIVA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ACTIVA">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/AI-Studio-GHRAB/access/access-gate.css">
  <style>html[data-ghrab-access="checking"] body{visibility:hidden}</style>
  <style>/*==ACTIVA_STYLES==*/</style>
</head>
<body class="activa-editorial">
  <!--==ACTIVA_BODY==-->
  <script type="application/ghrab-protected" data-ghrab-protected>/*==ACTIVA_JS==*/</script>
  <script type="module" data-ghrab-access-bootstrap>
    const APP_ID = 'activity-builder';
    function fail(title = 'Přístup nelze ověřit', message = 'Centrální přístupová služba není dostupná. Otevřete aplikaci znovu přes AI Studio GHRAB.') {
      document.documentElement.dataset.ghrabAccess = 'denied';
      document.body.style.visibility = 'visible';
      document.body.innerHTML = '<main class="ghrab-access-gate"><div class="ghrab-access-gate-mark">⬡</div><p class="ghrab-access-gate-eyebrow">AI STUDIO GHRAB</p><h1>' + title + '</h1><p>' + message + '</p><div class="ghrab-access-gate-actions"><a class="ghrab-access-gate-primary" href="/AI-Studio-GHRAB/">Otevřít AI Studio</a></div></main>';
    }
    try {
      const { protectApp } = await import('/AI-Studio-GHRAB/access/app-guard.js');
      let permit = null;
      document.addEventListener('ghrab:app-access-granted', (event) => { permit = event.detail?.permit || null; }, { once: true });
      const allowed = await protectApp(APP_ID, { studioUrl: '/AI-Studio-GHRAB/' });
      if (!allowed) {
        fail('Přístup nebyl povolen', 'Sestavovač aktivit není pro tento účet nebo zařízení odemčen. Zkontrolujte oprávnění v AI Studiu.');
      } else {
        window.__GHRAB_STUDIO_ACCESS__ = Object.freeze({ appId: APP_ID, permit });
        for (const source of [...document.querySelectorAll('script[type="application/ghrab-protected"]')]) {
          const executable = document.createElement('script');
          for (const attr of source.attributes) {
            if (!['type', 'data-ghrab-protected', 'data-ghrab-original-type'].includes(attr.name)) executable.setAttribute(attr.name, attr.value);
          }
          const originalType = source.getAttribute('data-ghrab-original-type');
          if (originalType) executable.type = originalType;
          executable.textContent = source.textContent;
          source.replaceWith(executable);
        }
      }
    } catch (error) {
      console.error('ACTIVA access bootstrap failed', error);
      fail();
    }
  </script>
  <noscript><style>html[data-ghrab-access="checking"] body{visibility:visible}</style><main style="max-width:42rem;margin:4rem auto;padding:1.5rem;font-family:system-ui">ACTIVA vyžaduje JavaScript a platný přístup z AI Studia GHRAB.</main></noscript>
</body>
</html>
